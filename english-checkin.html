<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语学习打卡</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 480px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        h1 { color: #333; font-size: 24px; margin-bottom: 8px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 20px; }
        
        .streak {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .streak-number { font-size: 32px; font-weight: bold; }
        
        .input-group { margin-bottom: 16px; }
        label { display: block; color: #333; font-size: 14px; margin-bottom: 8px; font-weight: 500; }
        input, textarea, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-item {
            text-align: center;
            padding: 16px 8px;
            background: #f8f9ff;
            border-radius: 10px;
        }
        .stat-value { font-size: 24px; font-weight: bold; color: #667eea; }
        .stat-label { font-size: 12px; color: #666; margin-top: 4px; }
        
        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-top: 12px;
        }
        .calendar-header {
            text-align: center;
            font-size: 12px;
            color: #999;
            padding: 8px 0;
        }
        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            border-radius: 6px;
            background: #f5f5f5;
            color: #999;
        }
        .calendar-day.checked {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .calendar-day.today { border: 2px solid #667eea; }
        
        .log-list { max-height: 200px; overflow-y: auto; }
        .log-item {
            padding: 12px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .log-item:last-child { border-bottom: none; }
        .log-date { color: #999; font-size: 12px; }
        .log-content { color: #333; font-size: 14px; }
        
        .tab-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            background: #f5f5f5;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .success-msg {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .success-msg.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📚 英语学习打卡</h1>
            <p class="subtitle" id="todayDate"></p>
            
            <div class="streak">
                <span>🔥</span>
                <span class="streak-number" id="streak">0</span>
                <span>天连续打卡</span>
            </div>
            
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalDays">0</div>
                    <div class="stat-label">总天数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalWords">0</div>
                    <div class="stat-label">单词数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalMins">0</div>
                    <div class="stat-label">分钟</div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <div class="tab-nav">
                <button class="tab-btn active" onclick="switchTab('checkin')">打卡</button>
                <button class="tab-btn" onclick="switchTab('calendar')">日历</button>
                <button class="tab-btn" onclick="switchTab('logs')">记录</button>
            </div>
            
            <div id="tab-checkin">
                <div class="input-group">
                    <label>今日学习内容</label>
                    <select id="learnType">
                        <option value="背单词">背单词</option>
                        <option value="听力">听力练习</option>
                        <option value="口语">口语练习</option>
                        <option value="阅读">阅读</option>
                        <option value="写作">写作</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>学习数量/时长</label>
                    <input type="text" id="learnAmount" placeholder="如：20个单词 / 30分钟">
                </div>
                <div class="input-group">
                    <label>今日心得（可选）</label>
                    <textarea id="learnNote" rows="3" placeholder="今天学到了什么？"></textarea>
                </div>
                <button class="btn" onclick="submitCheckin()">✨ 立即打卡</button>
            </div>
            
            <div id="tab-calendar" style="display:none;">
                <div class="calendar-header">
                    <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
                </div>
                <div class="calendar" id="calendar"></div>
            </div>
            
            <div id="tab-logs" style="display:none;">
                <div class="log-list" id="logList"></div>
            </div>
        </div>
    </div>
    
    <div class="success-msg" id="successMsg">🎉 打卡成功！</div>
    
    <script>
        // 初始化
        const STORAGE_KEY = 'englishCheckin';
        let logs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        
        // 显示今日日期
        const today = new Date();
        const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
        document.getElementById('todayDate').textContent = 
            `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日 ${weekdays[today.getDay()]}`;
        
        // 计算连续打卡
        function calcStreak() {
            if (logs.length === 0) return 0;
            const sortedLogs = [...logs].sort((a, b) => new Date(b.date) - new Date(a.date));
            let streak = 0;
            let checkDate = new Date();
            checkDate.setHours(0,0,0,0);
            
            for (let log of sortedLogs) {
                const logDate = new Date(log.date);
                logDate.setHours(0,0,0,0);
                const diff = (checkDate - logDate) / (1000*60*60*24);
                if (diff <= 1) {
                    streak++;
                    checkDate = logDate;
                } else {
                    break;
                }
            }
            return streak;
        }
        
        // 更新统计
        function updateStats() {
            document.getElementById('totalDays').textContent = logs.length;
            document.getElementById('streak').textContent = calcStreak();
            
            let words = 0, mins = 0;
            logs.forEach(log => {
                const match = log.amount.match(/(\d+)/);
                if (match) {
                    if (log.type.includes('单词')) words += parseInt(match[1]);
                    else mins += parseInt(match[1]);
                }
            });
            document.getElementById('totalWords').textContent = words;
            document.getElementById('totalMins').textContent = mins;
        }
        
        // 提交打卡
        function submitCheckin() {
            const type = document.getElementById('learnType').value;
            const amount = document.getElementById('learnAmount').value;
            const note = document.getElementById('learnNote').value;
            
            if (!amount) {
                alert('请输入学习数量或时长');
                return;
            }
            
            const log = {
                id: Date.now(),
                date: new Date().toISOString().split('T')[0],
                type,
                amount,
                note,
                time: new Date().toLocaleTimeString()
            };
            
            logs.unshift(log);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
            
            // 清空表单
            document.getElementById('learnAmount').value = '';
            document.getElementById('learnNote').value = '';
            
            // 显示成功
            document.getElementById('successMsg').classList.add('show');
            setTimeout(() => document.getElementById('successMsg').classList.remove('show'), 2000);
            
            updateStats();
            renderCalendar();
            renderLogs();
        }
        
        // 切换标签
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-checkin').style.display = tab === 'checkin' ? 'block' : 'none';
            document.getElementById('tab-calendar').style.display = tab === 'calendar' ? 'block' : 'none';
            document.getElementById('tab-logs').style.display = tab === 'logs' ? 'block' : 'none';
            if (tab === 'calendar') renderCalendar();
            if (tab === 'logs') renderLogs();
        }
        
        // 渲染日历
        function renderCalendar() {
            const year = today.getFullYear();
            const month = today.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            const checkedDates = new Set(logs.map(l => l.date));
            let html = '';
            
            // 空白
            for (let i = 0; i < firstDay; i++) {
                html += '<div class="calendar-day"></div>';
            }
            
            // 日期
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isChecked = checkedDates.has(dateStr);
                const isToday = dateStr === new Date().toISOString().split('T')[0];
                html += `<div class="calendar-day ${isChecked ? 'checked' : ''} ${isToday ? 'today' : ''}">${d}</div>`;
            }
            
            document.getElementById('calendar').innerHTML = html;
        }
        
        // 渲染记录
        function renderLogs() {
            if (logs.length === 0) {
                document.getElementById('logList').innerHTML = '<p style="text-align:center;color:#999;padding:20px;">暂无打卡记录</p>';
                return;
            }
            
            let html = '';
            logs.slice(0, 20).forEach(log => {
                html += `
                    <div class="log-item">
                        <div>
                            <div class="log-content">${log.type} - ${log.amount}</div>
                            ${log.note ? `<div style="color:#666;font-size:12px;margin-top:4px;">${log.note}</div>` : ''}
                        </div>
                        <div class="log-date">${log.date}</div>
                    </div>
                `;
            });
            document.getElementById('logList').innerHTML = html;
        }
        
        // 初始化
        updateStats();
    </script>
</body>
</html>
